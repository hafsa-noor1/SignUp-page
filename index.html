<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
      <center>
    <h1>Sign Up</h1>
    <p>It's free and always will be</p>
    <hr>
    First Name: <input type="text"> <br><br>
    Last Name: <input type="text"> <br><br>
    Your Email: <input type="email"> <br><br>
    Re-enter Email: <input type="text"> <br><br>
    New Password: <input type="password"> <br><br>
    I am: <select name="gender" id="">
        <option value="">Select Sex:</option>
        <option value="">Male</option>
        <option value="">Female</option>
    </select> <br><br>
    Birthday: <select name="month:" id="">
        <option value="">Month</option>
        <option>January</option>
        <option>February</option>
        <option>March</option>
        <option>April</option>
        <option>May</option>
        <option>June</option>
        <option>July</option>
        <option>August</option>
        <option>September</option>
        <option>October</option>
        <option>November</option>
        <option>December</option>
    </select>
    <select name="day" id="">
        <option value="">Day:</option>
        <option value="">01</option>
        <option value="">02</option>
        <option value="">03</option>
        <option value="">04</option>
        <option value="">05</option>
    </select>
    <select name="year" id="">
        <option value="">Year:</option>
        <option value="">2023</option>
        <option value="">2024</option>
        <option value="">2025</option>
    </select> <br><br>
    <p>Why do I need to provide my birthday?</p>
    <p>By clicking Sign Up, you agree to our Terms and that you have read and understand our Data Use Policy,including our Cookie Use.</p>
    <br>
    <input type="submit" value="Sign Up">
    </center>
</body>
</html>
